{% extends 'base.html' %}
{% block title %}Requisición de Compra{% endblock %}

{% block content %}
<div class="page">
  <div class="topbar">
    <div>
      <div class="page-title">Requisición de Compra</div>
      <div class="page-subtitle">Completá los datos y generá el PDF</div>
    </div>
  </div>

  <div class="glow-card" style="max-width:700px">
    <div style="text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--dk-border)">
      <div style="font-size:16px;font-weight:700;background:linear-gradient(135deg,var(--blue2),var(--violet2));-webkit-background-clip:text;-webkit-text-fill-color:transparent">MYLAN</div>
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em">Requisición de Compra</div>
    </div>

    <form method="POST">
      <div class="form-grid" style="margin-bottom:12px">
        <div><label class="form-label">Nº Requisición</label><input class="dark-input" name="numero" placeholder="RC-0001"></div>
        <div><label class="form-label">Fecha</label><input class="dark-input" type="date" name="fecha"></div>
      </div>
      <div class="form-grid" style="margin-bottom:12px">
        <div><label class="form-label">Solicitante</label><input class="dark-input" name="solicitante"></div>
        <div><label class="form-label">Departamento</label><input class="dark-input" name="departamento" value="Marketing"></div>
      </div>
      <div style="margin-bottom:18px">
        <label class="form-label">Justificación / Observaciones</label>
        <textarea class="dark-input" name="observaciones" style="min-height:60px;resize:vertical"></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button type="submit" class="btn-glow btn-primary-glow">Generar PDF</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
